<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savor Onboarding - Screen 6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2C3E50 0%, #D4A574 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .phone-container {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 32px;
            position: relative;
            overflow: hidden;
        }
        
        .content {
            padding: 60px 30px 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }
        
        .top-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .food-gallery {
            position: relative;
            width: 280px;
            height: 200px;
            margin-bottom: 40px;
        }
        
        .gallery-card {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: 2px solid rgba(212, 165, 116, 0.3);
        }
        
        .gallery-card:nth-child(1) {
            top: 20px;
            left: 20px;
            animation: floatCard 4s ease-in-out infinite;
            z-index: 3;
        }
        
        .gallery-card:nth-child(2) {
            top: 10px;
            right: 30px;
            animation: floatCard 4s ease-in-out infinite 1s;
            background: linear-gradient(45deg, #a8e6cf, #88d8a3);
            z-index: 2;
        }
        
        .gallery-card:nth-child(3) {
            bottom: 40px;
            left: 40px;
            animation: floatCard 4s ease-in-out infinite 2s;
            background: linear-gradient(45deg, #ffd93d, #ff9500);
            z-index: 1;
        }
        
        .gallery-card:nth-child(4) {
            bottom: 20px;
            right: 20px;
            animation: floatCard 4s ease-in-out infinite 3s;
            background: linear-gradient(45deg, #a8c8ec, #7d8dc1);
            z-index: 4;
        }
        
        .gallery-card:nth-child(5) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: floatCard 4s ease-in-out infinite 0.5s;
            background: linear-gradient(45deg, #D4A574, #f4d03f);
            z-index: 5;
        }
        
        .memory-count {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #D4A574;
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        .headline {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .subtext {
            font-size: 18px;
            color: #B0B0B0;
            line-height: 1.4;
            margin-bottom: 50px;
            max-width: 300px;
        }
        
        .feature-highlights {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
            padding: 0 20px;
        }
        
        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .feature-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.2), rgba(212, 165, 116, 0.1));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid rgba(212, 165, 116, 0.3);
        }
        
        .feature-text {
            color: #B0B0B0;
            font-size: 12px;
            text-align: center;
            max-width: 60px;
        }
        
        .cta-buttons {
            display: flex;
            flex-direction: column;
            gap: 0px;
        }
        
        .primary-btn {
            background: linear-gradient(135deg, #D4A574, #f4d03f);
            border: none;
            border-radius: 25px;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 165, 116, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .primary-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(212, 165, 116, 0.4);
        }
        
        .primary-btn:hover::before {
            left: 100%;
        }
        
        
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #D4A574;
        }
        
        .celebration-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            color: #D4A574;
            font-size: 16px;
            animation: celebrate 3s ease-out infinite;
            opacity: 0;
        }
        
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 1s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1.5s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 2s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 0.3s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 0.8s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 1.3s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.8s; }
        
        @keyframes floatCard {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes celebrate {
            0% { 
                opacity: 0; 
                transform: translateY(100vh) rotate(0deg) scale(0.5); 
            }
            10% { 
                opacity: 1; 
            }
            90% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translateY(-100px) rotate(360deg) scale(1); 
            }
        }
        
        .glow-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 165, 116, 0.1) 0%, transparent 70%);
            animation: glow 4s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="screen">
            <div class="glow-effect"></div>
            <div class="celebration-particles">
                <div class="particle">✨</div>
                <div class="particle">🎉</div>
                <div class="particle">⭐</div>
                <div class="particle">💫</div>
                <div class="particle">🌟</div>
                <div class="particle">✨</div>
                <div class="particle">🎊</div>
                <div class="particle">⭐</div>
                <div class="particle">💫</div>
            </div>
            <div class="content">
                <div class="top-section">
                    <div class="food-gallery">
                        <div class="gallery-card">🍕</div>
                        <div class="gallery-card">🍣</div>
                        <div class="gallery-card">🥘</div>
                        <div class="gallery-card">🍰</div>
                        <div class="gallery-card">🍜</div>
                        <div class="memory-count">∞</div>
                    </div>
                    
                    <h1 class="headline">Your food story starts with tonight's meal</h1>
                    <p class="subtext">Never lose another incredible food memory. Build your personal vault, one dish at a time.</p>
                    
                    <div class="feature-highlights">
                        <div class="feature">
                            <div class="feature-icon">📱</div>
                            <div class="feature-text">Instant Scanning</div>
                        </div>
                        <div class="feature">
                            <div class="feature-icon">🧠</div>
                            <div class="feature-text">AI Memory</div>
                        </div>
                        <div class="feature">
                            <div class="feature-icon">🗂️</div>
                            <div class="feature-text">Smart Organization</div>
                        </div>
                    </div>
                </div>
                
                <div class="bottom-section">
                    <div class="cta-buttons">
                        <button class="primary-btn">Start My Food Story</button>
                    </div>
                    <div class="progress-dots">
                        <div class="dot active"></div>
                        <div class="dot active"></div>
                        <div class="dot active"></div>
                        <div class="dot active"></div>
                        <div class="dot active"></div>
                        <div class="dot active"></div>
                        <div class="dot active"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Trigger celebration particles on load
        window.addEventListener('load', () => {
            const particles = document.querySelectorAll('.particle');
            
            // Start particle animation with staggered delays
            particles.forEach((particle, index) => {
                setTimeout(() => {
                    particle.style.animationPlayState = 'running';
                }, index * 200);
            });
            
            // Restart particles every 6 seconds
            setInterval(() => {
                particles.forEach((particle, index) => {
                    setTimeout(() => {
                        particle.style.animation = 'none';
                        particle.offsetHeight; // Trigger reflow
                        particle.style.animation = 'celebrate 3s ease-out infinite';
                    }, index * 200);
                });
            }, 6000);
        });
        
        // Add interaction effects
        const primaryBtn = document.querySelector('.primary-btn');
        const secondaryBtn = document.querySelector('.secondary-btn');
        
        primaryBtn.addEventListener('click', (e) => {
            // Create ripple effect
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.width = '4px';
            ripple.style.height = '4px';
            ripple.style.background = 'rgba(255, 255, 255, 0.6)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'scale(0)';
            ripple.style.animation = 'ripple 0.6s linear';
            ripple.style.left = e.offsetX + 'px';
            ripple.style.top = e.offsetY + 'px';
            
            e.target.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
        
        // Add CSS for ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(20);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
